<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Three.js Basic Scene</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            overflow: hidden;
            background-color: #E8BDC8;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
    <script>
      const params = new URLSearchParams(location.search);
      const forcedRenderer = params.get('renderer');
      const useWebGPU = forcedRenderer === 'webgpu' || (forcedRenderer !== 'webgl' && !!navigator.gpu);
      const target = useWebGPU ? './webgpu.html' : './webgl.html';
      location.replace(target + location.search + location.hash);
    </script>
</head>
<body></body>
</html>
